 <script>

 let gamestarted = false;

 function loadChapter(chapter) { 
   gamestarted = true; 

   document.getElementById('menuContainer').classList.add('compressed');
   document.getElementById('menuContainer').classList.add('fade-out');
   document.getElementById('leftGate').classList.add('active');
   document.getElementById('rightGate').classList.add('active');

   const chapterPath = `chapter${chapter}/`; 
   
   setTimeout(() => {
     fetch(`${chapterPath}index.html`).then(res => { 
       if (!res.ok) { 
         throw new Error(`Failed to load ${chapterPath}index.html`); 
       } 
       return res.text(); 
     }).then(html => { 
       const chapterDocument = new DOMParser().parseFromString(html, 'text/html'); 
       let base = chapterDocument.querySelector('base'); 
       if (!base) { 
         base = chapterDocument.createElement('base'); 
         chapterDocument.head.prepend(base); 
       } 
       base.href = new URL(chapterPath, window.location.href).href; 
       document.documentElement.innerHTML = chapterDocument.documentElement.innerHTML; 
       document.documentElement.querySelectorAll('script').forEach(oldScript => { 
         const newScript = document.createElement('script'); 
         if (oldScript.src) { 
           newScript.src = oldScript.src; 
         } else { 
           newScript.textContent = oldScript.textContent; 
         } 
         document.body.appendChild(newScript); 
       }); 
     }).catch(error => { 
       console.error(error); 
       window.location.href = `${chapterPath}index.html`; 
     }); 
   }, 2900); 
 } 

 const menumoveaudio = new Audio('audios/snd_menumove.mp3');

 let selectedChapter = null;
 document.addEventListener('keydown', function(event) {
   if (!gamestarted) {
     if (event.key === 'ArrowUp') {
       if (selectedChapter === null) {
         selectedChapter = 0;
         document.querySelectorAll('.row')[0].classList.add("selected");

         document.querySelectorAll('.row')[selectedChapter].classList.add("selected");

 <script>
 (function() {
   const IDB_NAME  = '/_savedata';
   const IDB_STORE = 'FILE_DATA';
   const CHAPTERS  = [1, 2, 3, 4, 5]; // update when 6 releases

   
   const ALL_SLOTS = [0, 1, 2, 3, 4, 5, 9];
   const COMPLETE_TIERS = [[0,3,9],[1,4,9],[2,5,9]];

   function openDB() {
     return new Promise((resolve, reject) => {
       const req = indexedDB.open(IDB_NAME);
       req.onsuccess = e => resolve(e.target.result);
       req.onerror   = e => reject(e.target.error);
     });
   }

   function getAllKeys(db) {
     return new Promise((resolve, reject) => {
       const tx  = db.transaction(IDB_STORE, 'readonly');
       const req = tx.objectStore(IDB_STORE).getAllKeys();
       req.onsuccess = e => resolve(new Set(e.target.result.map(String)));
       req.onerror   = e => reject(e.target.error);
     });
   }

   function hasAnyFile(ch, foundSet) {
     return ALL_SLOTS.some(s => foundSet.has(`/_savedata/filech${ch}_${s}`));
   }

   function isCompleted(ch, foundSet) {
     return [0, 3, 9].every(s => foundSet.has(`/_savedata/filech${ch}_${s}`));
   }

   function dismissScreen() {
     const screen = document.getElementById('continueScreen');
     screen.classList.add('fade-out');
     
     const drone = document.getElementById('drone');
     if (drone) drone.play().catch(() => {});
     setTimeout(() => screen.remove(), 650);
   }

   function playChapterAudio(ch) {
     const id = `ch${ch}`;
     const el = document.getElementById(id);
     if (el) { el.currentTime = 0; el.play().catch(() => {}); }
   }

   function buildScreen(ch, completed) {
     const msg     = document.getElementById('csMessage');
     const buttons = document.getElementById('csButtons');
     const nextCh  = ch + 1;

     if (completed) {
       msg.textContent = `Chapter ${ch} was completed.`;
       
       const btnPlay = document.createElement('button');
       btnPlay.className = 'cs-btn selected';
       btnPlay.textContent = `Play Chapter ${nextCh}`;
       btnPlay.addEventListener('mouseenter', () => setSelected(btnPlay));
       btnPlay.addEventListener('click', () => {
         playChapterAudio(nextCh);
         setTimeout(() => { loadChapter(nextCh); dismissScreen(); }, 80);
       });

       const btnSelect = document.createElement('button');
       btnSelect.className = 'cs-btn';
       btnSelect.textContent = 'Chapter Select';
       btnSelect.addEventListener('mouseenter', () => setSelected(btnSelect));
       btnSelect.addEventListener('click', () => {
         playSound(menuselectaudio);
         dismissScreen();
       });

       buttons.appendChild(btnPlay);
       buttons.appendChild(btnSelect);
       setupKeyboard([btnPlay, btnSelect]);
     } else {
       msg.textContent = `Continue from Chapter ${ch}?`;
       
       const btnYes = document.createElement('button');
       btnYes.className = 'cs-btn selected';
       btnYes.textContent = 'Yes';
       btnYes.addEventListener('mouseenter', () => setSelected(btnYes));
       btnYes.addEventListener('click', () => {
         playChapterAudio(ch);
         setTimeout(() => { loadChapter(ch); dismissScreen(); }, 80);
       });

       const btnNo = document.createElement('button');
       btnNo.className = 'cs-btn';
       btnNo.textContent = 'No';
       btnNo.addEventListener('mouseenter', () => setSelected(btnNo));
       btnNo.addEventListener('click', () => {
         playSound(menuselectaudio);
         dismissScreen();
       });

       buttons.appendChild(btnYes);
       buttons.appendChild(btnNo);
       setupKeyboard([btnYes, btnNo]);
     }
   }

   function setSelected(activeBtn) {
     document.querySelectorAll('#continueScreen .cs-btn').forEach(b => b.classList.remove('selected'));
     activeBtn.classList.add('selected');
     playSound(menumoveaudio);
   }

   function setupKeyboard(btns) {
     let idx = 0;
     function move(dir) {
       idx = (idx + dir + btns.length) % btns.length;
       document.querySelectorAll('#continueScreen .cs-btn').forEach(b => b.classList.remove('selected'));
       btns[idx].classList.add('selected');
       playSound(menumoveaudio);
     }
     document.addEventListener('keydown', function csKey(e) {
       if (!document.getElementById('continueScreen')) {
         document.removeEventListener('keydown', csKey);
         return;
       }
       if (e.key === 'ArrowDown') move(1);
       else if (e.key === 'ArrowUp') move(-1);
       else if (e.key === 'Enter' || e.key === 'z' || e.key === 'Z') btns[idx].click();
     });
   }

   async function initContinueScreen() {
     
     const drone = document.getElementById('drone');
     if (drone) drone.pause();
     try {
       const db       = await openDB();
       const foundSet = await getAllKeys(db);
       db.close();

       
       let continueCh = null;
       for (const ch of CHAPTERS) {
         if (!isCompleted(ch, foundSet)) {
           if (hasAnyFile(ch, foundSet)) continueCh = ch;
           break;
         }
       }

       if (continueCh !== null) {
         
         buildScreen(continueCh, false);
         return;
       }

       
       // update max chapter when chapter 6 is out
       const MAX_CHAPTER = 5;
       const allDone = CHAPTERS.every(ch => isCompleted(ch, foundSet));
       if (allDone) {
         const lastCh = CHAPTERS[CHAPTERS.length - 1];
         if (lastCh >= MAX_CHAPTER) {
           
           dismissScreen();
           return;
         }
         buildScreen(lastCh, true);
         return;
       }

       
       dismissScreen();
     } catch (err) {
       console.warn('[Continue screen]', err);
       dismissScreen();
     }
   }

   if (document.readyState === 'loading') {
     document.addEventListener('DOMContentLoaded', initContinueScreen);
   } else {
     initContinueScreen();
   }
 })();
 </script>
 <script>
 (function() {
   const IDB_NAME  = '/_savedata';
   const IDB_STORE = 'FILE_DATA';

   
   const TIERS = [
     [0, 3, 9],  
     [1, 4, 9],  
     [2, 5, 9],  
   ];

   
   const STAR_SRC = 'spr_ui_star_1.png';

   function openDB() {
     return new Promise((resolve, reject) => {
       const req = indexedDB.open(IDB_NAME);
       req.onsuccess = e => resolve(e.target.result);
       req.onerror   = e => reject(e.target.error);
     });
   }

   function getAllKeys(db) {
     return new Promise((resolve, reject) => {
       const tx  = db.transaction(IDB_STORE, 'readonly');
       const req = tx.objectStore(IDB_STORE).getAllKeys();
       req.onsuccess = e => resolve(new Set(e.target.result.map(String)));
       req.onerror   = e => reject(e.target.error);
     });
   }

   
   function countStars(ch, foundSet) {
     let stars = 0;
     for (const tier of TIERS) {
       const allPresent = tier.every(slot =>
         foundSet.has(`/_savedata/filech${ch}_${slot}`)
       );
       if (allPresent) stars++;
     }
     return stars;
   }

   function applyStars(ch, starCount) {
     if (starCount === 0) return;

     const row = document.querySelector(`.row[data-chapter="${ch}"]`);
     if (!row) return;

     
     const chapterSpan = row.querySelector('.chapter');
     if (!chapterSpan) return;

     const container = document.createElement('span');
     container.className = 'idb-stars';

     for (let i = 0; i < starCount; i++) {
       const star = document.createElement('span');
       star.className = 'idb-star';
       star.title = `${starCount} star${starCount > 1 ? 's' : ''}`;
       container.appendChild(star);

       
       requestAnimationFrame(() => {
         setTimeout(() => star.classList.add('visible'), i * 80);
       });
     }

     
     chapterSpan.appendChild(container);
   }

   async function scanIDB() {
     try {
       const db       = await openDB();
       const foundSet = await getAllKeys(db);
       db.close();

       document.querySelectorAll('.row[data-chapter]').forEach(row => {
         const ch = parseInt(row.dataset.chapter, 10);
         if (!isNaN(ch)) {
           applyStars(ch, countStars(ch, foundSet));
         }
       });
     } catch (err) {
       console.warn('[IDB star checker]', err);
     }
   }

   if (document.readyState === 'loading') {
     document.addEventListener('DOMContentLoaded', scanIDB);
   } else {
     scanIDB();
   }
 })();
 </script>
